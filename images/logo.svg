<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="curveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <style>
      .anim-grid { opacity: 0; animation: fadeGrid 6s ease-out infinite; }
      .anim-curve { stroke-dasharray: 180; stroke-dashoffset: 180; animation: drawCurve 6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .anim-dot { opacity: 0; transform-origin: 50px 50px; animation: popDot 6s infinite; }
      @keyframes fadeGrid { 0%, 5% { opacity: 0; } 15%, 90% { opacity: 0.35; } 100% { opacity: 0; } }
      @keyframes drawCurve { 0%, 10% { stroke-dashoffset: 180; opacity: 1; } 30%, 90% { stroke-dashoffset: 0; opacity: 1; } 95%, 100% { stroke-dashoffset: 0; opacity: 0; } }
      @keyframes popDot { 
        0%, 28% { opacity: 0; transform: scale(0.3); filter: drop-shadow(0 0 0px #2dd4bf); } 
        32% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 6px #2dd4bf); } 
        38% { transform: scale(1); filter: drop-shadow(0 0 2px #2dd4bf); } 
        55% { transform: scale(1.05); filter: drop-shadow(0 0 8px #2dd4bf); } 
        75% { transform: scale(1); filter: drop-shadow(0 0 2px #2dd4bf); } 
        90% { opacity: 1; transform: scale(1); } 
        95%, 100% { opacity: 0; transform: scale(0.5); } 
      }
    </style>
  </defs>

  <g class="anim-grid" stroke="#30363d" stroke-width="1.5">
    <line x1="10" y1="75" x2="90" y2="75" />
    <line x1="10" y1="50" x2="90" y2="50" />
    <line x1="10" y1="25" x2="90" y2="25" />
    <line x1="10" y1="10" x2="10" y2="90" />
    <line x1="36" y1="10" x2="36" y2="90" />
    <line x1="63" y1="10" x2="63" y2="90" />
    <line x1="90" y1="10" x2="90" y2="90" />
    <line x1="8" y1="50" x2="92" y2="50" stroke="#e3a03a" stroke-width="2.5" stroke-dasharray="6 4" stroke-linecap="round" />
  </g>

  <path class="anim-curve" d="M 10 85 Q 40 85, 50 50 T 90 10" stroke="url(#curveGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <circle class="anim-dot" cx="50" cy="50" r="6" fill="#161b22" stroke="#2dd4bf" stroke-width="3" />
</svg>
